name: Bug report
description: Report a reproducible problem in Web, CLI, core, or AI integration.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Codex Long Task Starter.
        Do not paste API keys, generated secrets, private project files, or screenshots containing credentials.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The Web app failed when...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web UI
        - CLI
        - Core markdown generation
        - AI / OpenAI-compatible API
        - Documentation
        - Release / packaging
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Node:
        pnpm:
        Browser:
        Provider:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove API keys and private data before posting.
      render: text
    validations:
      required: false
