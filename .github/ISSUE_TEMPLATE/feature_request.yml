name: Feature request
description: Suggest a small, release-friendly improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This project is currently focused on a local-first `v0.1.0-alpha`.
        Please avoid requests for SaaS features, login, billing, multi-tenant systems, or large UI rewrites unless they are explicitly part of a future roadmap discussion.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small UI wording or state improvement
        - Web flow stability
        - CLI usability
        - Example template
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
